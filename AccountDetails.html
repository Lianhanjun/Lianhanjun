
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link rel="stylesheet" href="AccountDetails.css">
</head>
<body>

    <!-- Logo -->
    <a href="//" class="Logo" >
        <img src="C:\xampp\htdocs\(Assignment_RWDD)\Zcv1910-RWDD_Project-2026\WhatsApp Image 2026-02-23 at 18.11.58.jpeg" alt="Logo">
    </a>

     <!-- Header -->
    <h1>Account Details</h1>

    <div class="profile">
        <div class="avatar" aria-hidden="true"></div>
        <p><div class="edit-profile" href="#">Edit Profile</div></p>
    </div>

    <!-- Form -->
    <form action="#" method="POST" class="account-form">
        <table class="account-table" role="presentation">
            <tr>
                <td class="label">Username:</td>
                <td>
                    <input type="text" name="username" id="username">
                    <small class="field-error" id="usernameError"></small>
                </td>
            </tr>
            <tr>
                <td class="label">Phone Number:</td>
                <td>
                    <input type="tel" name="phone" id="phone">
                    <small class="field-error" id="phoneError"></small>
                </td>
            </tr>
            <tr>
                <td class="label">Email:</td>
                <td>
                    <input type="email" name="email" id="email">
                    <small class="field-error" id="emailError"></small>
                </td>
            </tr>
            <tr>
                <td class="label">Password:</td>
                <td>
                    <input type="password" name="password" id="password">
                    <small class="field-error" id="passwordError"></small>
                </td>
            </tr>
            <tr>
                <td class="label">Confirm Password:</td>
                <td>
                    <input type="password" name="confirm_password" id="confirmPassword">
                    <small class="field-error" id="confirmPasswordError"></small>
                    <div class="password-rules">
                        <ul>
                            <li class="capital">ONE capital letter</li>
                            <li class="symbol">symbols of: * ! . , -</li>
                            <li class="length">minimum of 8 characters</li>
                            <li class="number">minimum 2 numbers</li>
                        </ul>
                    </div>
                </td>
            </tr>
        </table>

        <div class="form-actions">
            <button type="button" class="btn btn-secondary" onclick="history.back()">Back</button>
            <button type="submit" class="btn btn-primary">Change</button>
            <div aria-hidden="true"></div>
        </div>
    </form>
    <script src="AccountDetails.js"></script>
</body>
</html>
