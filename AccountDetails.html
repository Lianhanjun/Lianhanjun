<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    h1 {
         font-family: 'Open Sans', sans-serif;
         display: flex;
        align-items: center;
        justify-content: center;
    }
    table {
         font-family: 'Open Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 30px auto;
            padding: 200px 50px;
            font-size: 30px;
            cursor:default;
            width: 100%;
    }
    button element {
        font-family: 'Open Sans', sans-serif;
         display: flex;
        align-items: center;
        justify-content: center;
            margin: -150px auto;
            padding: 50px 50px;
            font-size: 30px;
            cursor: pointer;
            width: 50%;
    }
</style>
<body>

    <!-- Logo -->
     <div>

     </div>

     <!-- Header -->
      <h1>
Account Details
      </h1>


        <!-- Form -->
    <form action="#" method="POST">
        <table>
            <tr>
                <td>Username:</td>
                <td><input type="text" name="username"></td>
            </tr>
            <tr>
                <td>Phone Number:</td>
                <td><input type="tel" name="phone"></td>
            </tr>
            <tr>
                <td>Email:</td>
                <td><input type="email" name="email"></td>
            </tr>
            <tr>
                <td>Password:</td>
                <td><input type="password" name="password"></td>
            </tr>
            <tr>
                <td>Confirm Password:</td>
                <td><input type="password" name="confirm_password"></td>
            </tr>
        </table>

        <br>

        <button type="submit">Change</button>
    </form>
</body>
</html>
